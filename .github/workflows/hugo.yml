name: Deploy Hugo

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          submodules: recursive
          fetch-depth: 0
          hugo-version: latest
          extended: true

      - name: Build
        run: |
          cd maizel_site
          hugo --minify --baseURL "https://github.io"

      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: maizel_site/public

  deploy:

    environment:
      name: github-pages

    needs: build

    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:

      - name: Deploy
        uses: actions/deploy-pages@v4
